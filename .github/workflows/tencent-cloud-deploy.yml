name: Deploy Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tencent-cloud-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          TENCENT_CLOUD_HOST: ${{ secrets.TENCENT_CLOUD_HOST }}
          TENCENT_CLOUD_PORT: ${{ secrets.TENCENT_CLOUD_PORT }}
          TENCENT_CLOUD_SSH_KEY: ${{ secrets.TENCENT_CLOUD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$TENCENT_CLOUD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${TENCENT_CLOUD_PORT:-22}" -H "$TENCENT_CLOUD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy latest main to Tencent Cloud
        env:
          TENCENT_CLOUD_HOST: ${{ secrets.TENCENT_CLOUD_HOST }}
          TENCENT_CLOUD_PORT: ${{ secrets.TENCENT_CLOUD_PORT }}
          TENCENT_CLOUD_USER: ${{ secrets.TENCENT_CLOUD_USER }}
          TENCENT_CLOUD_PATH: ${{ secrets.TENCENT_CLOUD_PATH }}
          GITHUB_REPOSITORY_URL: https://github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          ssh -p "${TENCENT_CLOUD_PORT:-22}" "${TENCENT_CLOUD_USER}@${TENCENT_CLOUD_HOST}" <<EOF
          set -euo pipefail
          if [ ! -d "${TENCENT_CLOUD_PATH}/.git" ]; then
            rm -rf "${TENCENT_CLOUD_PATH}"
            git clone "${GITHUB_REPOSITORY_URL}" "${TENCENT_CLOUD_PATH}"
          fi
          cd "${TENCENT_CLOUD_PATH}"
          git remote set-url origin "${GITHUB_REPOSITORY_URL}"
          git fetch origin main
          git reset --hard origin/main
          bash deploy/tencent-cloud/deploy.sh
          EOF
