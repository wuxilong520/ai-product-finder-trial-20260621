name: Deploy Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tencent-cloud-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure SSH
        env:
          TENCENT_CLOUD_HOST: ${{ secrets.TENCENT_CLOUD_HOST }}
          TENCENT_CLOUD_PORT: ${{ secrets.TENCENT_CLOUD_PORT }}
          TENCENT_CLOUD_SSH_KEY: ${{ secrets.TENCENT_CLOUD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$TENCENT_CLOUD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${TENCENT_CLOUD_PORT:-22}" -H "$TENCENT_CLOUD_HOST" >> ~/.ssh/known_hosts

      - name: Package release bundle
        run: |
          set -euo pipefail
          BUNDLE_PATH="${RUNNER_TEMP}/release.tgz"
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=frontend/.next \
            --exclude=frontend/node_modules \
            --exclude=backend/__pycache__ \
            --exclude=backend/.pytest_cache \
            --exclude='*.pyc' \
            -czf "${BUNDLE_PATH}" .
          mv "${BUNDLE_PATH}" ./release.tgz

      - name: Upload release bundle to Tencent Cloud
        env:
          TENCENT_CLOUD_HOST: ${{ secrets.TENCENT_CLOUD_HOST }}
          TENCENT_CLOUD_PORT: ${{ secrets.TENCENT_CLOUD_PORT }}
          TENCENT_CLOUD_USER: ${{ secrets.TENCENT_CLOUD_USER }}
          TENCENT_CLOUD_PATH: ${{ secrets.TENCENT_CLOUD_PATH }}
        run: |
          set -euo pipefail
          ssh -p "${TENCENT_CLOUD_PORT:-22}" "${TENCENT_CLOUD_USER}@${TENCENT_CLOUD_HOST}" "mkdir -p '${TENCENT_CLOUD_PATH}'"
          scp -P "${TENCENT_CLOUD_PORT:-22}" release.tgz "${TENCENT_CLOUD_USER}@${TENCENT_CLOUD_HOST}:${TENCENT_CLOUD_PATH}/release.tgz"

      - name: Deploy release bundle on Tencent Cloud
        env:
          TENCENT_CLOUD_HOST: ${{ secrets.TENCENT_CLOUD_HOST }}
          TENCENT_CLOUD_PORT: ${{ secrets.TENCENT_CLOUD_PORT }}
          TENCENT_CLOUD_USER: ${{ secrets.TENCENT_CLOUD_USER }}
          TENCENT_CLOUD_PATH: ${{ secrets.TENCENT_CLOUD_PATH }}
        run: |
          set -euxo pipefail
          ssh -p "${TENCENT_CLOUD_PORT:-22}" "${TENCENT_CLOUD_USER}@${TENCENT_CLOUD_HOST}" <<EOF | tee remote-deploy.log
          set -Eexuo pipefail
          echo "[remote] path=${TENCENT_CLOUD_PATH}"
          mkdir -p "${TENCENT_CLOUD_PATH}"
          find "${TENCENT_CLOUD_PATH}" -mindepth 1 -maxdepth 1 ! -name 'backend' ! -name 'deploy' -exec rm -rf {} +
          rm -rf "${TENCENT_CLOUD_PATH}/frontend" "${TENCENT_CLOUD_PATH}/.github"
          tar -xzf "${TENCENT_CLOUD_PATH}/release.tgz" -C "${TENCENT_CLOUD_PATH}"
          rm -f "${TENCENT_CLOUD_PATH}/release.tgz"
          cd "${TENCENT_CLOUD_PATH}"
          echo "[remote] pwd=$(pwd)"
          echo "[remote] root listing"
          ls -la
          echo "[remote] deploy listing"
          ls -la "${TENCENT_CLOUD_PATH}/deploy/tencent-cloud"
          echo "[remote] env file check"
          test -f "${TENCENT_CLOUD_PATH}/deploy/tencent-cloud/.env.tencent"
          bash -x "${TENCENT_CLOUD_PATH}/deploy/tencent-cloud/deploy.sh"
          EOF

      - name: Upload remote deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-deploy-log
          path: remote-deploy.log
