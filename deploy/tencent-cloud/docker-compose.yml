services:
  frontend:
    build:
      context: ../..
      dockerfile: deploy/tencent-cloud/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    build:
      context: ../..
      dockerfile: deploy/tencent-cloud/backend.Dockerfile
    env_file:
      - ./.env.tencent
    environment:
      PORT: 8000
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: docker.m.daocloud.io/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
